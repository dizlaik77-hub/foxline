<video id="videoPlayer" controls width="600">
    <source src="/videos/anime360.mp4" type="video/mp4" data-quality="360">
    <source src="/videos/anime720.mp4" type="video/mp4" data-quality="720">
</video>

<select id="quality">
    <option value="360">360p</option>
    <option value="720">720p</option>
</select>

<script>
const player = document.getElementById("videoPlayer");
const quality = document.getElementById("quality");

quality.addEventListener("change", () => {
    const sources = player.getElementsByTagName("source");

    for (let s of sources) {
        if (s.dataset.quality === quality.value) {
            player.src = s.src;
            player.load();
            player.play();
        }
    }
});
</script>
